<div class="container-fluid" style="padding:3px !important;text-align:center !important;">
    <div class="row">
        <div class="col-lg-12">
            <div style="text-align:center !important;">
                <img id="imageBanner" src="https://myfundiv2.martinlayooinc.com/images/blogs.jpg" style="padding:3px !important; width:30% !important; height:auto !important;" alt="[[Blog Image]]" />
            </div>
            <div id="blogs">
                <div *ngFor="let blog of blogs">
                    <h2>{{blog.blogName}}</h2>
                    <div style="text-align:center !important;">
                        <img src="{{'https://myfundiv2.martinlayooinc.com/images/'+ blog.blogName +'.jpg'}}" style="padding:3px !important; width:73% !important; height:auto !important;" id="sharedImage" />
                    </div>
                    <div style="text-align:left !important;">
                        <div innerHTML="{{blog.blogContent}}">
                        </div>
                        <br />
                    </div>
                    <span>Dated: {{blog.dateCreatedUtc}}</span><br />
                    <hr />
                </div>
            </div>
            <div class="form-group" id="createBlog" *ngIf="isAdiministrator">
                <input type="file" id="blogImage" class="form-control-file" name="blogImage" (change)="uploadBlogFile($event)" /><br />
                <input type="text" id="blogName" class="form-control-file" name="blogName" [(ngModel)]="blog.blogName" placeholder="Enter Blog Name" /><br />
                <textarea placeholder="Enter Blog Content" id="blogContent" name="blogContent" [(ngModel)]="blog.blogContent" style="width:100% !important;height:85vh !important;"></textarea>
                <input type="button" class="btn-primary" (click)="submitBlog($event)" value="Upload Blog" /><br />
            </div>
        </div>
    </div>
</div>
