<div class="container-fluid" style="padding:3px !important;text-align:center !important;">
    <div class="row">
        <div class="col-lg-12">
            <div style="text-align:center !important;">
                <img id="imageBanner" src="https://myfundiv2.martinlayooinc.com/images/blogs.jpg" style="padding:3px !important; width:95% !important; height:auto !important;" alt="[[Blog Image]]" />
            </div>
            <div id="blogs">
                <div *ngFor="let blog of blogs">
                    <h2>{{blog.blogName}}</h2>
                    <div *ngIf="blgo.blogImageUrl">
                        <img src="https://martinlayooinc.com/images{{blog.blogName}}.jpg" id="sharedImage" />
                    </div>
                    <div>
                        {{blog.blogContent.replace('\n','<br/>')}}
                    </div>
                    <br />
                    <span>Dated: {{blog.dateCreated.toUTCString()}}</span><br/>
                    <hr/>
                </div>
            </div>
            <div class="form-group" id="createBlog">
                <input type="file" id="blogImage" class="form-control-file" name="blogImage" (change)="uploadBlogFile($event)" /><br />
                <input type="text" id="blogName" class="form-control-file" name="blogName" [(ngModel)]="blog.blogName" /><br />
                <textarea id="blogContent" name="blogContent" [(ngModel)]="blog.blogContent" style="width:100% !important;height:85vh !important;"></textarea>
                <input type="button" class="btn-primary" (click)="submitBlog($event)" value="Upload Blog" /><br />
            </div>
        </div>
    </div>
</div>
